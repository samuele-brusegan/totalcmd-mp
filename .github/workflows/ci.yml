name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Fast frontend-only checks: lint + typecheck. Runs on every push.
  frontend:
    name: frontend (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: typecheck
        run: npx tsc -b
      - name: lint
        run: npx eslint src

  # Rust check on Linux only — much faster than building everything per OS.
  # The bundled build for all OSes happens only on tag in release.yml.
  rust:
    name: rust (check + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ci

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --locked --all-targets

      - name: clippy
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets -- -D warnings
        continue-on-error: true # don't gate yet, just surface findings
