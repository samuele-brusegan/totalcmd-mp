<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background: rounded square with Catppuccin-inspired gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181825"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#cba6f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Frame -->
  <rect x="32" y="32" width="960" height="960" rx="180" ry="180" fill="url(#bg)"/>
  <rect x="32" y="32" width="960" height="960" rx="180" ry="180"
        fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.55"/>

  <!-- Two panels side-by-side -->
  <g filter="url(#shadow)">
    <!-- Left panel -->
    <rect x="140" y="240" width="340" height="544" rx="40" ry="40"
          fill="#11111b" stroke="#89b4fa" stroke-width="6"/>
    <!-- Left panel header bar -->
    <rect x="160" y="262" width="300" height="42" rx="14" ry="14" fill="#313244"/>
    <!-- Left panel "files" -->
    <rect x="170" y="332" width="280" height="14" rx="4" fill="#cdd6f4" opacity="0.9"/>
    <rect x="170" y="372" width="240" height="14" rx="4" fill="#a6adc8" opacity="0.7"/>
    <rect x="170" y="412" width="260" height="14" rx="4" fill="#a6adc8" opacity="0.7"/>
    <rect x="170" y="452" width="200" height="14" rx="4" fill="#a6adc8" opacity="0.55"/>
    <rect x="170" y="492" width="220" height="14" rx="4" fill="#a6adc8" opacity="0.55"/>
    <rect x="170" y="532" width="180" height="14" rx="4" fill="#a6adc8" opacity="0.4"/>

    <!-- Right panel -->
    <rect x="544" y="240" width="340" height="544" rx="40" ry="40"
          fill="#11111b" stroke="#cba6f7" stroke-width="6"/>
    <!-- Right panel header bar -->
    <rect x="564" y="262" width="300" height="42" rx="14" ry="14" fill="#313244"/>
    <!-- Right panel "files" -->
    <rect x="574" y="332" width="260" height="14" rx="4" fill="#cdd6f4" opacity="0.9"/>
    <rect x="574" y="372" width="220" height="14" rx="4" fill="#a6adc8" opacity="0.7"/>
    <rect x="574" y="412" width="280" height="14" rx="4" fill="#a6adc8" opacity="0.7"/>
    <rect x="574" y="452" width="240" height="14" rx="4" fill="#a6adc8" opacity="0.55"/>
    <rect x="574" y="492" width="200" height="14" rx="4" fill="#a6adc8" opacity="0.55"/>
    <rect x="574" y="532" width="220" height="14" rx="4" fill="#a6adc8" opacity="0.4"/>
  </g>

  <!-- Transfer arrow between the two panels -->
  <g transform="translate(512 512)">
    <!-- Glow disc behind the arrow -->
    <circle r="68" fill="url(#accent)" opacity="0.18"/>
    <!-- Arrow shaft -->
    <rect x="-44" y="-10" width="88" height="20" rx="10" ry="10" fill="url(#accent)"/>
    <!-- Arrow head pointing right -->
    <path d="M 32 -28 L 64 0 L 32 28 Z" fill="url(#accent)"/>
    <!-- Arrow head pointing left -->
    <path d="M -32 -28 L -64 0 L -32 28 Z" fill="url(#accent)"/>
  </g>

  <!-- F-key bar at the bottom (TC signature) -->
  <g transform="translate(140 824)">
    <rect x="0"   y="0" width="148" height="38" rx="10" fill="#313244"/>
    <rect x="158" y="0" width="148" height="38" rx="10" fill="#45475a"/>
    <rect x="316" y="0" width="148" height="38" rx="10" fill="#313244"/>
    <rect x="474" y="0" width="148" height="38" rx="10" fill="#45475a"/>
    <rect x="632" y="0" width="112" height="38" rx="10" fill="#313244"/>
  </g>
</svg>
